# .github/workflows/publish.yml
#
# CI/CD Teaching Moment #6: Publish to PyPI on version tag
# ─────────────────────────────────────────────────────────────────────────────
# Triggered ONLY when a tag matching v* is pushed (e.g., v0.1.0, v1.2.3).
# Never triggered on regular branch pushes.
#
# CI/CD Teaching Moment #5: Semantic versioning
#   MAJOR.MINOR.PATCH — communicate the impact of each release:
#   - PATCH: fix: commits (backward-compatible bug fixes)
#   - MINOR: feat: commits (backward-compatible new features)
#   - MAJOR: feat!: or fix!: commits (breaking changes)
#
#   Workflow:
#     git tag v0.2.0
#     git push origin v0.2.0
#   → This workflow runs → package published to PyPI
#
#   Or automate with commitizen:
#     poetry run cz bump   (reads commits, bumps version, creates tag)
#
# PyPI Trusted Publishing (OIDC):
#   More secure than API tokens — no secret to rotate or accidentally expose.
#   GitHub's OIDC identity proves the publish is from the legitimate repo.
#   Setup at pypi.org: Project Settings → Publishing → Add pending publisher
#     Publisher: GitHub Actions
#     Repository: brianraney/jackknife
#     Workflow: publish.yml
# ─────────────────────────────────────────────────────────────────────────────

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi

    permissions:
      id-token: write   # Required for OIDC trusted publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.4"

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
